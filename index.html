<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日打卡 - Daily Check-in</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .date-display {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .stats-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            text-align: center;
        }
        
        .stat-item {
            padding: 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            border-radius: 15px;
        }
        
        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }
        
        .habits-grid {
            display: grid;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .habit-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .habit-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .habit-card.completed {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .habit-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            background: #f5f7fa;
            flex-shrink: 0;
        }
        
        .habit-card.completed .habit-icon {
            background: rgba(255,255,255,0.2);
        }
        
        .habit-info {
            flex: 1;
        }
        
        .habit-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .habit-streak {
            font-size: 0.85rem;
            opacity: 0.7;
        }
        
        .check-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #ddd;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        
        .habit-card.completed .check-btn {
            border-color: white;
            background: rgba(255,255,255,0.3);
        }
        
        .check-btn.checked::after {
            content: '✓';
            color: white;
            font-weight: bold;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: white;
            color: #667eea;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .analysis-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .analysis-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        
        .chart-container {
            margin-bottom: 20px;
        }
        
        .chart-title {
            font-size: 1rem;
            color: #666;
            margin-bottom: 10px;
        }
        
        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 150px;
            padding: 10px 0;
            border-bottom: 2px solid #eee;
        }
        
        .bar-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .bar {
            width: 100%;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px 5px 0 0;
            transition: all 0.3s ease;
            min-height: 5px;
        }
        
        .bar-label {
            font-size: 0.7rem;
            color: #666;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        
        .bar-value {
            font-size: 0.75rem;
            color: #667eea;
            font-weight: bold;
        }
        
        .insights {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            border-radius: 15px;
            padding: 15px;
        }
        
        .insights h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        
        .insights ul {
            list-style: none;
            padding: 0;
        }
        
        .insights li {
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
            color: #555;
            font-size: 0.9rem;
        }
        
        .insights li:last-child {
            border-bottom: none;
        }
        
        .insights li::before {
            content: '💡 ';
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            color: #333;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }
        
        .data-textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.85rem;
            resize: vertical;
        }
        
        .progress-ring {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
        }
        
        .progress-ring svg {
            transform: rotate(-90deg);
        }
        
        .progress-ring circle {
            fill: none;
            stroke-width: 8;
        }
        
        .progress-ring .bg {
            stroke: rgba(255,255,255,0.3);
        }
        
        .progress-ring .progress {
            stroke: white;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }
        
        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
            
            .habit-icon {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
            }
            
            .habit-name {
                font-size: 1rem;
            }
            
            .action-buttons {
                justify-content: center;
            }
            
            .btn {
                padding: 10px 18px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌟 每日打卡</h1>
            <div class="date-display" id="currentDate"></div>
        </div>
        
        <div class="stats-card">
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-number" id="completedCount">0</div>
                    <div class="stat-label">今日完成</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalCount">8</div>
                    <div class="stat-label">总项目</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="completionRate">0%</div>
                    <div class="stat-label">完成率</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalDays">0</div>
                    <div class="stat-label">打卡天数</div>
                </div>
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="btn btn-primary" onclick="showExportModal()">
                📥 导出数据
            </button>
            <button class="btn btn-secondary" onclick="showImportModal()">
                📤 导入数据
            </button>
            <button class="btn btn-secondary" onclick="resetToday()">
                🔄 重置今日
            </button>
        </div>
        
        <div class="habits-grid" id="habitsGrid"></div>
        
        <div class="analysis-section">
            <h2>📊 数据分析 & 复盘</h2>
            
            <div class="chart-container">
                <div class="chart-title">近7天完成率趋势</div>
                <div class="bar-chart" id="weeklyChart"></div>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">各项习惯完成次数（最近30天）</div>
                <div class="bar-chart" id="habitChart"></div>
            </div>
            
            <div class="insights" id="insights">
                <h3>🎯 智能洞察</h3>
                <ul id="insightsList">
                    <li>数据加载中...</li>
                </ul>
            </div>
        </div>
    </div>
    
    <div class="modal" id="exportModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📥 导出数据</h2>
                <button class="close-btn" onclick="closeModal('exportModal')">&times;</button>
            </div>
            <p style="margin-bottom: 10px; color: #666;">复制以下 JSON 数据保存到安全的地方：</p>
            <textarea class="data-textarea" id="exportData" readonly></textarea>
            <button class="btn btn-primary" style="margin-top: 15px; width: 100%;" onclick="copyExportData()">
                📋 复制到剪贴板
            </button>
        </div>
    </div>
    
    <div class="modal" id="importModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📤 导入数据</h2>
                <button class="close-btn" onclick="closeModal('importModal')">&times;</button>
            </div>
            <p style="margin-bottom: 10px; color: #666;">粘贴之前导出的 JSON 数据：</p>
            <textarea class="data-textarea" id="importData" placeholder="粘贴 JSON 数据 here..."></textarea>
            <button class="btn btn-primary" style="margin-top: 15px; width: 100%;" onclick="importData()">
                ✅ 确认导入
            </button>
        </div>
    </div>
    
    <div class="progress-ring">
        <svg width="80" height="80">
            <circle class="bg" cx="40" cy="40" r="32"></circle>
            <circle class="progress" cx="40" cy="40" r="32" 
                    stroke-dasharray="201" stroke-dashoffset="201" id="progressCircle"></circle>
        </svg>
        <div class="progress-text" id="progressText">0%</div>
    </div>

    <script>
        const habits = [
            { id: 1, name: '早睡', icon: '🌙', streak: 0 },
            { id: 2, name: '运动', icon: '💪', streak: 0 },
            { id: 3, name: '晒太阳', icon: '☀️', streak: 0 },
            { id: 4, name: '饮食清淡', icon: '🥗', streak: 0 },
            { id: 5, name: '学粤语', icon: '🗣️', streak: 0 },
            { id: 6, name: '看书', icon: '📚', streak: 0 },
            { id: 7, name: '考试准备', icon: '✍️', streak: 0 },
            { id: 8, name: '审美提升', icon: '🎨', streak: 0 }
        ];
        
        let todayStatus = {};
        let streakData = {};
        
        function init() {
            loadData();
            updateDate();
            renderHabits();
            updateStats();
            renderAnalysis();
        }
        
        function loadData() {
            const today = getTodayKey();
            const saved = localStorage.getItem('checkin_' + today);
            if (saved) {
                todayStatus = JSON.parse(saved);
            }
            
            const streaks = localStorage.getItem('streaks');
            if (streaks) {
                streakData = JSON.parse(streaks);
            }
            
            habits.forEach(h => {
                if (!streakData[h.id]) {
                    streakData[h.id] = 0;
                }
            });
        }
        
        function saveData() {
            const today = getTodayKey();
            localStorage.setItem('checkin_' + today, JSON.stringify(todayStatus));
            localStorage.setItem('streaks', JSON.stringify(streakData));
        }
        
        function getTodayKey() {
            return new Date().toISOString().split('T')[0];
        }
        
        function getAllData() {
            const data = {
                exportDate: new Date().toISOString(),
                streaks: streakData,
                history: {}
            };
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('checkin_')) {
                    const date = key.replace('checkin_', '');
                    data.history[date] = JSON.parse(localStorage.getItem(key));
                }
            }
            
            return data;
        }
        
        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', options);
        }
        
        function renderHabits() {
            const grid = document.getElementById('habitsGrid');
            grid.innerHTML = habits.map(habit => {
                const isCompleted = todayStatus[habit.id];
                const streak = streakData[habit.id] || 0;
                return `
                    <div class="habit-card ${isCompleted ? 'completed' : ''}" onclick="toggleHabit(${habit.id})">
                        <div class="habit-icon">${habit.icon}</div>
                        <div class="habit-info">
                            <div class="habit-name">${habit.name}</div>
                            <div class="habit-streak">🔥 连续 ${streak} 天</div>
                        </div>
                        <div class="check-btn ${isCompleted ? 'checked' : ''}"></div>
                    </div>
                `;
            }).join('');
        }
        
        function toggleHabit(id) {
            if (todayStatus[id]) {
                delete todayStatus[id];
            } else {
                todayStatus[id] = true;
            }
            saveData();
            renderHabits();
            updateStats();
            renderAnalysis();
        }
        
        function updateStats() {
            const completed = Object.keys(todayStatus).length;
            const total = habits.length;
            const rate = Math.round((completed / total) * 100);
            
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('completionRate').textContent = rate + '%';
            document.getElementById('progressText').textContent = rate + '%';
            
            const data = getAllData();
            document.getElementById('totalDays').textContent = Object.keys(data.history).length;
            
            const circle = document.getElementById('progressCircle');
            const circumference = 2 * Math.PI * 32;
            const offset = circumference - (rate / 100) * circumference;
            circle.style.strokeDashoffset = offset;
        }
        
        function renderAnalysis() {
            renderWeeklyChart();
            renderHabitChart();
            generateInsights();
        }
        
        function renderWeeklyChart() {
            const data = getAllData();
            const chart = document.getElementById('weeklyChart');
            const days = [];
            
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const key = d.toISOString().split('T')[0];
                const dayData = data.history[key] || {};
                const completed = Object.keys(dayData).length;
                const rate = Math.round((completed / habits.length) * 100);
                
                days.push({
                    label: i === 0 ? '今天' : `${d.getMonth()+1}/${d.getDate()}`,
                    value: rate,
                    completed: completed
                });
            }
            
            chart.innerHTML = days.map(day => `
                <div class="bar-item">
                    <div class="bar-value">${day.value}%</div>
                    <div class="bar" style="height: ${Math.max(day.value, 5)}px;"></div>
                    <div class="bar-label">${day.label}</div>
                </div>
            `).join('');
        }
        
        function renderHabitChart() {
            const data = getAllData();
            const chart = document.getElementById('habitChart');
            const habitCounts = {};
            
            habits.forEach(h => habitCounts[h.id] = 0);
            
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            
            Object.entries(data.history).forEach(([date, dayData]) => {
                if (new Date(date) >= thirtyDaysAgo) {
                    Object.keys(dayData).forEach(habitId => {
                        if (habitCounts[habitId] !== undefined) {
                            habitCounts[habitId]++;
                        }
                    });
                }
            });
            
            const maxCount = Math.max(...Object.values(habitCounts), 1);
            
            chart.innerHTML = habits.map(habit => {
                const count = habitCounts[habit.id];
                const height = (count / maxCount) * 100;
                return `
                    <div class="bar-item">
                        <div class="bar-value">${count}</div>
                        <div class="bar" style="height: ${Math.max(height, 5)}px;"></div>
                        <div class="bar-label">${habit.icon}</div>
                    </div>
                `;
            }).join('');
        }
        
        function generateInsights() {
            const data = getAllData();
            const insights = [];
            
            const totalDays = Object.keys(data.history).length;
            if (totalDays === 0) {
                insights.push('开始打卡吧！坚持就是胜利 💪');
            } else {
                // 找出最佳习惯
                const habitCounts = {};
                habits.forEach(h => habitCounts[h.id] = 0);
                Object.values(data.history).forEach(dayData => {
                    Object.keys(dayData).forEach(habitId => {
                        habitCounts[habitId] = (habitCounts[habitId] || 0) + 1;
                    });
                });
                
                const bestHabit = habits.reduce((a, b) => 
                    (habitCounts[a.id] || 0) > (habitCounts[b.id] || 0) ? a : b
                );
                const bestCount = habitCounts[bestHabit.id] || 0;
                
                if (bestCount > 0) {
                    insights.push(`你的最强习惯是「${bestHabit.name}」，已完成 ${bestCount} 次！`);
                }
                
                // 找出需要改进的习惯
                const worstHabit = habits.reduce((a, b) => 
                    (habitCounts[a.id] || 0) < (habitCounts[b.id] || 0) ? a : b
                );
                const worstCount = habitCounts[worstHabit.id] || 0;
                
                if (worstCount < totalDays * 0.5) {
                    insights.push(`「${worstHabit.name}」需要加强，目前只完成了 ${worstCount} 次。`);
                }
                
                // 连续打卡天数
                let currentStreak = 0;
                for (let i = 0; i < 365; i++) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const key = d.toISOString().split('T')[0];
                    const dayData = data.history[key];
                    if (dayData && Object.keys(dayData).length >= 4) {
                        currentStreak++;
                    } else if (i > 0) {
                        break;
                    }
                }
                
                if (currentStreak >= 3) {
                    insights.push(`太棒了！你已经连续 ${currentStreak} 天完成大部分打卡 🎉`);
                }
                
                // 总体评价
                const avgCompletion = Object.values(data.history).reduce((sum, day) => 
                    sum + Object.keys(day).length, 0
                ) / (totalDays * habits.length) * 100;
                
                if (avgCompletion >= 80) {
                    insights.push('你的自律程度令人惊叹！继续保持 🌟');
                } else if (avgCompletion >= 50) {
                    insights.push('表现不错，还有提升空间，加油！');
                } else {
                    insights.push('刚开始养成习惯不容易，坚持就是胜利！');
                }
            }
            
            document.getElementById('insightsList').innerHTML = 
                insights.map(i => `<li>${i}</li>`).join('');
        }
        
        function showExportModal() {
            const data = getAllData();
            document.getElementById('exportData').value = JSON.stringify(data, null, 2);
            document.getElementById('exportModal').classList.add('active');
        }
        
        function showImportModal() {
            document.getElementById('importModal').classList.add('active');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        function copyExportData() {
            const textarea = document.getElementById('exportData');
            textarea.select();
            document.execCommand('copy');
            alert('数据已复制到剪贴板！');
        }
        
        function importData() {
            try {
                const json = document.getElementById('importData').value;
                const data = JSON.parse(json);
                
                if (confirm('导入数据将覆盖现有数据，确定继续吗？')) {
                    // 清除旧数据
                    for (let i = localStorage.length - 1; i >= 0; i--) {
                        const key = localStorage.key(i);
                        if (key && (key.startsWith('checkin_') || key === 'streaks')) {
                            localStorage.removeItem(key);
                        }
                    }
                    
                    // 导入新数据
                    if (data.streaks) {
                        localStorage.setItem('streaks', JSON.stringify(data.streaks));
                    }
                    if (data.history) {
                        Object.entries(data.history).forEach(([date, dayData]) => {
                            localStorage.setItem('checkin_' + date, JSON.stringify(dayData));
                        });
                    }
                    
                    alert('数据导入成功！');
                    closeModal('importModal');
                    init();
                }
            } catch (e) {
                alert('数据格式错误，请检查 JSON 格式！');
            }
        }
        
        function resetToday() {
            if (confirm('确定要重置今日所有打卡吗？')) {
                todayStatus = {};
                saveData();
                renderHabits();
                updateStats();
                renderAnalysis();
            }
        }
        
        // Initialize on load
        init();
    </script>
</body>
</html>
