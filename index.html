<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日打卡 - Daily Check-in</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="打卡">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .date-display {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .sync-status.syncing::before {
            content: '🔄';
            animation: spin 1s linear infinite;
        }

        .sync-status.synced::before {
            content: '✅';
        }

        .sync-status.offline::before {
            content: '⚠️';
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .user-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .user-input {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .user-input input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
        }

        .user-input input:focus {
            outline: none;
            border-color: #667eea;
        }

        .stats-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            text-align: center;
        }

        .stat-item {
            padding: 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            border-radius: 15px;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }

        .habits-grid {
            display: grid;
            gap: 15px;
            margin-bottom: 20px;
        }

        .habit-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .habit-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .habit-card.completed {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .habit-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            background: #f5f7fa;
            flex-shrink: 0;
        }

        .habit-card.completed .habit-icon {
            background: rgba(255,255,255,0.2);
        }

        .habit-info {
            flex: 1;
        }

        .habit-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .habit-streak {
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .check-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #ddd;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .habit-card.completed .check-btn {
            border-color: white;
            background: rgba(255,255,255,0.3);
        }

        .check-btn.checked::after {
            content: '✓';
            color: white;
            font-weight: bold;
        }

        .delete-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            font-size: 1rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background: rgba(231, 76, 60, 0.2);
        }

        .editing .delete-btn {
            display: flex;
        }

        .editing .habit-card {
            cursor: default;
        }

        .editing .habit-card:hover {
            transform: none;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: white;
            color: #667eea;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .btn-danger {
            background: rgba(231, 76, 60, 0.2);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .add-habit-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: none;
            margin-bottom: 20px;
        }

        .add-habit-card.show {
            display: block;
        }

        .add-habit-card h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .add-habit-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .add-habit-form input {
            flex: 1;
            min-width: 120px;
            padding: 10px 14px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 0.95rem;
        }

        .add-habit-form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .emoji-input {
            max-width: 60px;
            text-align: center;
            font-size: 1.3rem;
        }

        .analysis-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .analysis-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .chart-container {
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 1rem;
            color: #666;
            margin-bottom: 10px;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 150px;
            padding: 10px 0;
            border-bottom: 2px solid #eee;
        }

        .bar-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .bar {
            width: 100%;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px 5px 0 0;
            transition: all 0.3s ease;
            min-height: 5px;
        }

        .bar-label {
            font-size: 0.7rem;
            color: #666;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .bar-value {
            font-size: 0.75rem;
            color: #667eea;
            font-weight: bold;
        }

        .insights {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            border-radius: 15px;
            padding: 15px;
        }

        .insights h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .insights ul {
            list-style: none;
            padding: 0;
        }

        .insights li {
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
            color: #555;
            font-size: 0.9rem;
        }

        .insights li:last-child {
            border-bottom: none;
        }

        .insights li::before {
            content: '💡 ';
        }

        .progress-ring {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
        }

        .progress-ring svg {
            transform: rotate(-90deg);
        }

        .progress-ring circle {
            fill: none;
            stroke-width: 8;
        }

        .progress-ring .bg {
            stroke: rgba(255,255,255,0.3);
        }

        .progress-ring .progress {
            stroke: white;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .habit-icon {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
            }
            .habit-name {
                font-size: 1rem;
            }
            .action-buttons {
                justify-content: center;
            }
            .btn {
                padding: 10px 18px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌟 每日打卡</h1>
            <div class="date-display" id="currentDate"></div>
            <div class="sync-status synced" id="syncStatus">本地模式</div>
        </div>

        <div class="user-section">
            <h2>👤 用户设置</h2>
            <div class="user-input">
                <input type="text" id="userId" placeholder="输入用户名">
                <button class="btn btn-primary" onclick="connectUser()">连接</button>
            </div>
            <p style="color: #999; font-size: 0.9rem; margin-top: 10px;">💡 在不同设备使用相同用户名，数据会自动同步</p>
        </div>

        <div class="stats-card">
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-number" id="completedCount">0</div>
                    <div class="stat-label">今日完成</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalHabits">0</div>
                    <div class="stat-label">总项目</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="completionRate">0%</div>
                    <div class="stat-label">完成率</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalDays">0</div>
                    <div class="stat-label">打卡天数</div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-secondary" onclick="resetToday()">🔄 重置今日</button>
            <button class="btn btn-secondary" onclick="toggleAddHabit()">➕ 添加习惯</button>
            <button class="btn btn-secondary" id="editBtn" onclick="toggleEditMode()">✏️ 管理习惯</button>
        </div>

        <div class="add-habit-card" id="addHabitCard">
            <h3>➕ 添加新习惯</h3>
            <div class="add-habit-form">
                <input type="text" class="emoji-input" id="newHabitIcon" placeholder="🎯" maxlength="2">
                <input type="text" id="newHabitName" placeholder="习惯名称">
                <button class="btn btn-primary" onclick="addHabit()">添加</button>
            </div>
        </div>

        <div class="habits-grid" id="habitsGrid"></div>

        <div class="analysis-section">
            <h2>📊 数据分析 & 复盘</h2>
            <div class="chart-container">
                <div class="chart-title">近7天完成率趋势</div>
                <div class="bar-chart" id="weeklyChart"></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">各项习惯完成次数（最近30天）</div>
                <div class="bar-chart" id="habitChart"></div>
            </div>
            <div class="insights">
                <h3>🎯 智能洞察</h3>
                <ul id="insightsList">
                    <li>请先连接用户...</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="progress-ring">
        <svg width="80" height="80">
            <circle class="bg" cx="40" cy="40" r="32"></circle>
            <circle class="progress" id="progressCircle" cx="40" cy="40" r="32"
                    style="stroke-dasharray: 201; stroke-dashoffset: 201;"></circle>
        </svg>
        <div class="progress-text" id="progressText">0%</div>
    </div>

    <script>
        const API_BASE = 'https://daily-checkin-api.yummyyang0726.workers.dev';

        function fetchWithTimeout(url, options = {}, timeout = 3000) {
            return Promise.race([
                fetch(url, options),
                new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), timeout))
            ]);
        }

        const DEFAULT_HABITS = [
            { id: 1, name: '早睡', icon: '🌙' },
            { id: 2, name: '运动', icon: '💪' },
            { id: 3, name: '晒太阳', icon: '☀️' },
            { id: 4, name: '饮食清淡', icon: '🥗' },
            { id: 5, name: '学粤语', icon: '🗣️' },
            { id: 6, name: '看书', icon: '📚' },
            { id: 8, name: '审美提升', icon: '🎨' },
            { id: 9, name: '喝水 2L', icon: '💧' },
            { id: 10, name: '早起', icon: '⏰' },
            { id: 11, name: '拉伸', icon: '🧘' }
        ];

        let habits = [];
        let currentUser = null;
        let todayStatus = {};
        let userData = { history: {}, streaks: {} };
        let editMode = false;

        function loadHabits() {
            const saved = localStorage.getItem('checkin_habits');
            if (saved) {
                habits = JSON.parse(saved);
            } else {
                habits = DEFAULT_HABITS.map(h => ({ ...h, streak: 0 }));
                saveHabits();
            }
        }

        function saveHabits() {
            localStorage.setItem('checkin_habits', JSON.stringify(habits));
            syncToCloud();
        }

        function init() {
            loadHabits();
            updateDate();
            renderHabits();
            updateStats();
            const savedUser = localStorage.getItem('checkin_user');
            if (savedUser) {
                document.getElementById('userId').value = savedUser;
                connectUser();
            }
        }

        async function connectUser() {
            const userId = document.getElementById('userId').value.trim().toLowerCase();
            if (!userId) {
                alert('请输入用户名');
                return;
            }
            currentUser = userId;
            localStorage.setItem('checkin_user', userId);
            updateSyncStatus('syncing');

            // 先从云端拉数据（3秒超时）
            let remoteData = null;
            try {
                const res = await fetchWithTimeout(`${API_BASE}/api/data/${userId}`);
                if (res.ok) {
                    remoteData = await res.json();
                }
            } catch (e) { /* 超时或离线，降级到本地 */ }

            // 本地数据
            const localRaw = localStorage.getItem('checkin_data_' + userId);
            const localData = localRaw ? JSON.parse(localRaw) : null;

            // 合并：取历史记录更多的那个为基础，再合并另一个的记录
            if (remoteData && remoteData.history && Object.keys(remoteData.history).length > 0) {
                if (localData && localData.history) {
                    // 合并两边的历史
                    userData = { history: { ...remoteData.history, ...localData.history }, streaks: { ...remoteData.streaks, ...localData.streaks } };
                    // 对于两边都有的日期，取打卡项更多的
                    for (const date in remoteData.history) {
                        if (localData.history[date]) {
                            const remoteCount = Object.keys(remoteData.history[date]).length;
                            const localCount = Object.keys(localData.history[date]).length;
                            userData.history[date] = remoteCount >= localCount ? remoteData.history[date] : localData.history[date];
                        }
                    }
                } else {
                    userData = remoteData;
                }
            } else if (localData) {
                userData = localData;
            } else {
                userData = { history: {}, streaks: {} };
            }

            // 同步习惯列表
            if (remoteData && remoteData.habits && remoteData.habits.length > 0) {
                const localHabits = localStorage.getItem('checkin_habits');
                if (!localHabits) {
                    habits = remoteData.habits;
                    saveHabits();
                }
            }

            const today = getTodayKey();
            todayStatus = userData.history[today] || {};
            habits.forEach(h => {
                h.streak = userData.streaks[h.id] || 0;
            });

            // 保存到本地
            localStorage.setItem('checkin_data_' + userId, JSON.stringify(userData));

            // 先渲染页面，不阻塞用户操作
            renderHabits();
            updateStats();
            renderAnalysis();

            // 后台同步到云端
            syncToCloud();
        }

        function saveUserData() {
            const today = getTodayKey();
            userData.history[today] = todayStatus;
            if (currentUser) {
                localStorage.setItem('checkin_data_' + currentUser, JSON.stringify(userData));
                syncToCloud();
            }
        }

        async function syncToCloud() {
            if (!currentUser) return;
            try {
                updateSyncStatus('syncing');
                const payload = {
                    history: userData.history,
                    streaks: userData.streaks,
                    habits: habits
                };
                await fetchWithTimeout(`${API_BASE}/api/data/${currentUser}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                updateSyncStatus('synced');
            } catch (e) {
                updateSyncStatus('offline');
            }
        }

        function updateSyncStatus(status) {
            const el = document.getElementById('syncStatus');
            el.className = 'sync-status ' + status;
            const labels = { synced: '已同步', syncing: '同步中...', offline: '离线模式' };
            el.textContent = labels[status] || status;
        }

        function getTodayKey() {
            return new Date().toISOString().split('T')[0];
        }

        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', options);
        }

        function renderHabits() {
            const grid = document.getElementById('habitsGrid');
            grid.innerHTML = habits.map(habit => {
                const isCompleted = todayStatus[habit.id];
                return `
                    <div class="habit-card ${isCompleted ? 'completed' : ''}" onclick="${editMode ? '' : 'toggleHabit(' + habit.id + ')'}">
                        <div class="habit-icon">${habit.icon}</div>
                        <div class="habit-info">
                            <div class="habit-name">${habit.name}</div>
                            <div class="habit-streak">🔥 连续 ${habit.streak || 0} 天</div>
                        </div>
                        <div class="check-btn ${isCompleted ? 'checked' : ''}"></div>
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteHabit(${habit.id})">✕</button>
                    </div>
                `;
            }).join('');
        }

        function toggleHabit(id) {
            if (editMode) return;
            if (todayStatus[id]) {
                delete todayStatus[id];
            } else {
                todayStatus[id] = true;
            }
            const habit = habits.find(h => h.id === id);
            if (habit) {
                if (todayStatus[id]) {
                    habit.streak = (habit.streak || 0) + 1;
                } else {
                    habit.streak = Math.max(0, (habit.streak || 0) - 1);
                }
                userData.streaks[id] = habit.streak;
            }
            saveUserData();
            renderHabits();
            updateStats();
            renderAnalysis();
        }

        function toggleAddHabit() {
            const card = document.getElementById('addHabitCard');
            card.classList.toggle('show');
            if (card.classList.contains('show')) {
                document.getElementById('newHabitName').focus();
            }
        }

        function addHabit() {
            const name = document.getElementById('newHabitName').value.trim();
            const icon = document.getElementById('newHabitIcon').value.trim() || '🎯';
            if (!name) {
                alert('请输入习惯名称');
                return;
            }
            const maxId = habits.reduce((max, h) => Math.max(max, h.id), 0);
            habits.push({ id: maxId + 1, name, icon, streak: 0 });
            saveHabits();
            document.getElementById('newHabitName').value = '';
            document.getElementById('newHabitIcon').value = '';
            document.getElementById('addHabitCard').classList.remove('show');
            renderHabits();
            updateStats();
            renderAnalysis();
        }

        function deleteHabit(id) {
            const habit = habits.find(h => h.id === id);
            if (!habit) return;
            if (!confirm(`确定要删除「${habit.name}」吗？`)) return;
            habits = habits.filter(h => h.id !== id);
            delete todayStatus[id];
            saveHabits();
            saveUserData();
            renderHabits();
            updateStats();
            renderAnalysis();
        }

        function toggleEditMode() {
            editMode = !editMode;
            const grid = document.getElementById('habitsGrid');
            const btn = document.getElementById('editBtn');
            if (editMode) {
                grid.classList.add('editing');
                btn.textContent = '✅ 完成管理';
            } else {
                grid.classList.remove('editing');
                btn.textContent = '✏️ 管理习惯';
            }
            renderHabits();
        }

        function updateStats() {
            const completed = Object.keys(todayStatus).length;
            const total = habits.length;
            const rate = total === 0 ? 0 : Math.round((completed / total) * 100);
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('totalHabits').textContent = total;
            document.getElementById('completionRate').textContent = rate + '%';
            document.getElementById('progressText').textContent = rate + '%';
            const totalDays = Object.keys(userData.history).length;
            document.getElementById('totalDays').textContent = totalDays;
            const circle = document.getElementById('progressCircle');
            const circumference = 2 * Math.PI * 32;
            const offset = circumference - (rate / 100) * circumference;
            circle.style.strokeDashoffset = offset;
        }

        function renderAnalysis() {
            renderWeeklyChart();
            renderHabitChart();
            generateInsights();
        }

        function renderWeeklyChart() {
            const chart = document.getElementById('weeklyChart');
            const days = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const key = d.toISOString().split('T')[0];
                const dayData = userData.history[key] || {};
                const completed = Object.keys(dayData).length;
                const rate = habits.length === 0 ? 0 : Math.round((completed / habits.length) * 100);
                days.push({
                    label: i === 0 ? '今天' : `${d.getMonth()+1}/${d.getDate()}`,
                    value: rate
                });
            }
            chart.innerHTML = days.map(day => `
                <div class="bar-item">
                    <div class="bar-value">${day.value}%</div>
                    <div class="bar" style="height: ${Math.max(day.value, 5)}px;"></div>
                    <div class="bar-label">${day.label}</div>
                </div>
            `).join('');
        }

        function renderHabitChart() {
            const chart = document.getElementById('habitChart');
            const habitCounts = {};
            habits.forEach(h => habitCounts[h.id] = 0);
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            Object.entries(userData.history).forEach(([date, dayData]) => {
                if (new Date(date) >= thirtyDaysAgo) {
                    Object.keys(dayData).forEach(habitId => {
                        if (habitCounts[habitId] !== undefined) {
                            habitCounts[habitId]++;
                        }
                    });
                }
            });
            const maxCount = Math.max(...Object.values(habitCounts), 1);
            chart.innerHTML = habits.map(habit => {
                const count = habitCounts[habit.id];
                const height = (count / maxCount) * 100;
                return `
                    <div class="bar-item">
                        <div class="bar-value">${count}</div>
                        <div class="bar" style="height: ${Math.max(height, 5)}px;"></div>
                        <div class="bar-label">${habit.icon}</div>
                    </div>
                `;
            }).join('');
        }

        function generateInsights() {
            const insights = [];
            const history = userData.history || {};
            const totalDays = Object.keys(history).length;
            if (totalDays === 0) {
                insights.push('开始打卡吧！坚持就是胜利 💪');
            } else {
                const habitCounts = {};
                habits.forEach(h => habitCounts[h.id] = 0);
                Object.values(history).forEach(dayData => {
                    Object.keys(dayData).forEach(habitId => {
                        habitCounts[habitId] = (habitCounts[habitId] || 0) + 1;
                    });
                });
                const bestHabit = habits.reduce((a, b) =>
                    (habitCounts[a.id] || 0) > (habitCounts[b.id] || 0) ? a : b
                );
                const bestCount = habitCounts[bestHabit.id] || 0;
                if (bestCount > 0) {
                    insights.push(`你的最强习惯是「${bestHabit.name}」，已完成 ${bestCount} 次！`);
                }
                const worstHabit = habits.reduce((a, b) =>
                    (habitCounts[a.id] || 0) < (habitCounts[b.id] || 0) ? a : b
                );
                const worstCount = habitCounts[worstHabit.id] || 0;
                if (worstCount < totalDays * 0.5) {
                    insights.push(`「${worstHabit.name}」需要加强，目前只完成了 ${worstCount} 次。`);
                }
                let currentStreak = 0;
                for (let i = 0; i < 365; i++) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const key = d.toISOString().split('T')[0];
                    const dayData = history[key];
                    if (dayData && Object.keys(dayData).length >= 4) {
                        currentStreak++;
                    } else if (i > 0) {
                        break;
                    }
                }
                if (currentStreak >= 3) {
                    insights.push(`太棒了！你已经连续 ${currentStreak} 天完成大部分打卡 🎉`);
                }
                const avgCompletion = Object.values(history).reduce((sum, day) =>
                    sum + Object.keys(day).length, 0) / (totalDays * habits.length) * 100;
                if (avgCompletion >= 80) {
                    insights.push('你的自律程度令人惊叹！继续保持 🌟');
                } else if (avgCompletion >= 50) {
                    insights.push('表现不错，还有提升空间，加油！');
                } else {
                    insights.push('刚开始养成习惯不容易，坚持就是胜利！');
                }
            }
            document.getElementById('insightsList').innerHTML = insights.map(i => `<li>${i}</li>`).join('');
        }

        function resetToday() {
            if (confirm('确定要重置今日所有打卡吗？')) {
                todayStatus = {};
                saveUserData();
                renderHabits();
                updateStats();
                renderAnalysis();
            }
        }

        // Enter 键添加习惯
        document.getElementById('newHabitName').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addHabit();
        });

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        init();
    </script>
</body>
</html>
